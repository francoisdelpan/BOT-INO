<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Export des Anomalies</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #2F5AEA;
      --brand-dark: #2447bb;
      --brand-soft: #eef3ff;
      --text: #162033;
      --muted: #6b7280;
      --border: #d9e2ff;
      --danger: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: var(--text);
    }
    .page {
      padding: 18px 22px 18px;
    }
    .section-title {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
    }
    .filter-card {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .toggle-card {
      background: var(--brand-soft);
    }
    .is-disabled {
      opacity: 0.62;
      background: #f3f6fb;
    }
    #loaderOverlay {
      display: none;
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      background:rgba(255,255,255,0.85);
      z-index:9999;
      justify-content:center; align-items:center;
      flex-direction:column;
    }
    #loaderOverlay .spinner-border {
      width: 2.5rem !important;
      height: 2.5rem !important;
      border-width: 0.22rem;
      color: var(--brand) !important;
    }
    #loaderMessage {
      color: var(--brand) !important;
      font-size: 13px;
      font-weight: 700;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0;
    }
    .filter-row > * { margin-bottom:0; }
    .filter-row input[type="date"],
    .filter-row select,
    .filter-row .dropdown {
      flex:1;
    }
    .form-check-label,
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .form-control,
    .form-select,
    .dropdown-toggle {
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-control:focus,
    .form-select:focus,
    .dropdown-toggle:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
    }
    .dropdown-menu {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 28px rgba(22, 32, 51, 0.08);
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }
    .dropdown-item:hover {
      background-color: var(--brand-soft);
    }
    .body input[type="checkbox"] {
      margin: -2;
      margin-right: 0.75rem;
      width: 1.2rem;
      height: 1.2rem;
      accent-color: var(--brand);
    }
    .dropdown-item input[type="checkbox"] {
      margin: 0;
    }
    .helper-text {
      margin-top: -2px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .submit-btn {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.22);
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--brand-dark);
    }
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .signature {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--brand);
    }
    .signature a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body class="body" onload="loadExportAnomaliesModal()">
  <div class="page">
    <span class="section-title">Filtres</span>

    <div id="rangeCard" class="filter-card toggle-card">
      <div class="filter-row">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="toggleRange" onchange="onToggleRange()">
        <label class="form-check-label" for="toggleRange">Intervalle</label>
      </div>
      <input type="date" id="dateFrom" class="form-control">
      <input type="date" id="dateTo" class="form-control" disabled>
      </div>
    </div>

    <div id="errorCard" class="filter-card">
      <div class="filter-row">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="toggleError" onchange="onToggleError()">
        <label class="form-check-label" for="toggleError">Erreur</label>
      </div>
      <div class="dropdown me-2">
        <button id="errorDropdownBtn"
                class="btn btn-outline-secondary dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                disabled>
          Toutes les erreurs
        </button>
        <div id="errorDropdownMenu" class="dropdown-menu p-2">
          <!-- checkboxes injected here -->
        </div>
      </div>
      </div>
    </div>
    <small id="errorDesc" class="helper-text d-block"></small>


    <div id="caisseCard" class="filter-card">
      <div class="filter-row">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="toggleCaisse" onchange="onToggleCaisse()">
        <label class="form-check-label" for="toggleCaisse">Caisse</label>
      </div>
      <select id="caisseSelect" class="form-select" disabled>Toutes les caisses</select>
      </div>
    </div>

    <button id="exportBtn" class="submit-btn" onclick="exportAnomalies()" disabled>Extraire</button>
    <div class="signature">
      <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank" rel="noopener noreferrer">Utema</a>. 2026</span>
    </div>
  </div>

  <!-- Loader overlay -->
  <div id="loaderOverlay">
    <div class="spinner-border text-primary" style="width:3rem; height:3rem;"></div>
    <div id="loaderMessage" class="mt-3 text-primary fw-bold"></div>
  </div>

  <script>
    // full-screen loader helpers
    function showLoader(msg) {
      document.getElementById('loaderMessage').textContent = msg;
      document.getElementById('loaderOverlay').style.display = 'flex';
    }
    function hideLoader() {
      document.getElementById('loaderOverlay').style.display = 'none';
    }

    let errorMeta = {};
    let operatorOptions = [];

    function loadExportAnomaliesModal() {
      showLoader("Chargement des filtres…");
      google.script.run
        .withSuccessHandler(data => {
          populateErrorFilter(data.errorTypes);
          populateCaisseList(data.operators);
          attachFormListeners();
          refreshFormState();
          hideLoader();
        })
        .withFailureHandler(err => {
          hideLoader();
          alert("Erreur chargement filtres : " + err.message);
        })
        .loadIncidentFormLists();
    }

    function populateErrorFilter(errorTypes) {
      const menu = document.getElementById('errorDropdownMenu');
      menu.innerHTML = '';
      errorMeta = {};

      menu.addEventListener('click', event => {
        event.stopPropagation();
      });

      errorTypes.forEach(e => {
        errorMeta[e.key] = {
          payKey: e.payKey,
          errorKey: e.key,
          label:  e.label,
          desc:   e.explication
        };

        const wrapper = document.createElement('div');
        wrapper.className = 'form-check dropdown-item';

        const cb = document.createElement('input');
        cb.type      = 'checkbox';
        cb.className = 'form-check-input me-2 error-checkbox';
        cb.id        = `err-${e.key}`;
        cb.value     = e.key;
        cb.addEventListener('change', refreshFormState);

        const lbl = document.createElement('label');
        lbl.htmlFor      = cb.id;
        lbl.className    = 'form-check-label';
        lbl.textContent  = e.key;

        wrapper.appendChild(cb);
        wrapper.appendChild(lbl);
        menu.appendChild(wrapper);
      });
    }

    function populateCaisseList(ops) {
      operatorOptions = ops || [];
      const sel = document.getElementById('caisseSelect');
      sel.innerHTML = '';
      sel.insertAdjacentHTML('beforeend',
        '<option value="" selected>Toutes les caisses</option>'
      );
      operatorOptions.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.label;
        opt.text  = o.label;
        sel.appendChild(opt);
      });
    }

    function attachFormListeners() {
      ['dateFrom', 'dateTo', 'caisseSelect'].forEach(id => {
        document.getElementById(id).addEventListener('input', refreshFormState);
        document.getElementById(id).addEventListener('change', refreshFormState);
      });
    }

    function readFormState() {
      return {
        from: document.getElementById('dateFrom').value,
        to: document.getElementById('dateTo').value,
        rangeOn: document.getElementById('toggleRange').checked,
        errorOn: document.getElementById('toggleError').checked,
        caisseOn: document.getElementById('toggleCaisse').checked,
        caisse: document.getElementById('caisseSelect').value,
        selectedErrorKeys: getSelectedErrorKeys()
      };
    }

    function syncRangeUi(state) {
      const dateTo = document.getElementById('dateTo');
      const rangeCard = document.getElementById('rangeCard');
      dateTo.disabled = !state.rangeOn;
      rangeCard.classList.toggle('is-disabled', !state.rangeOn);
      if (!state.rangeOn) {
        dateTo.value = '';
      }
    }

    function syncErrorUi(state) {
      const btn = document.getElementById('errorDropdownBtn');
      const errorCard = document.getElementById('errorCard');
      btn.disabled = !state.errorOn;
      errorCard.classList.toggle('is-disabled', !state.errorOn);

      if (!state.errorOn) {
        document.querySelectorAll('.error-checkbox').forEach(cb => cb.checked = false);
        document.getElementById('errorDesc').textContent = '';
        btn.textContent = 'Toutes les erreurs';
        return;
      }

      const keys = getSelectedErrorKeys();
      btn.textContent = keys.length === 0
        ? 'Sélectionner les erreurs'
        : 'Sélectionné ci-dessous';
      document.getElementById('errorDesc').textContent =
        keys.length === 1
          ? errorMeta[keys[0]].errorKey
          : keys.map(key => errorMeta[key].errorKey).join(', ');
    }

    function syncCaisseUi(state) {
      const sel = document.getElementById('caisseSelect');
      const caisseCard = document.getElementById('caisseCard');
      sel.disabled = !state.caisseOn;
      caisseCard.classList.toggle('is-disabled', !state.caisseOn);
      if (!state.caisseOn) {
        sel.value = '';
      }
    }

    function refreshFormState() {
      const state = readFormState();
      syncRangeUi(state);
      syncErrorUi(state);
      syncCaisseUi(state);
      updateExportButton();
    }

    function getSelectedErrorKeys() {
      return Array.from(document.querySelectorAll('.error-checkbox'))
        .filter(cb => cb.checked)
        .map(cb => cb.value);
    }

    function getSelectedError() {
      return getSelectedErrorKeys().map(ek => errorMeta[ek]);
    }

    function updateExportButton() {
      const state = readFormState();
      const hasFrom = !!state.from;
      const rangeOk = !state.rangeOn || !!state.to;
      const errOk = !state.errorOn || state.selectedErrorKeys.length > 0;
      const cOk = !state.caisseOn || !!state.caisse;
      document.getElementById('exportBtn').disabled = !(hasFrom && rangeOk && errOk && cOk);
    }

    function onToggleRange() { refreshFormState(); }
    function onToggleError() { refreshFormState(); }
    function onToggleCaisse() { refreshFormState(); }

    function exportAnomalies() {
      refreshFormState();
      const state = readFormState();
      const from = state.from;
      const to = state.rangeOn ? state.to : '';
      const errKeys = state.errorOn ? getSelectedError() : [];
      const caisse = state.caisseOn ? state.caisse : '';

      if (!from) return alert("📅 Choisissez la date de début.");
      if (state.rangeOn && !to)
        return alert("📅 Choisissez la date de fin.");
      if (state.errorOn && errKeys.length === 0)
        return alert("🚨 Sélectionnez au moins une erreur.");
      if (state.caisseOn && !caisse)
        return alert("🚨 Choisissez une caisse.");

      showLoader("Génération de l'Export...");
      google.script.run
        .withSuccessHandler(url => {
          google.script.host.close();
          window.open(url,'_blank');
        })
        .withFailureHandler(err => {
          hideLoader();
          alert("Erreur export anomalies : " + err.message);
        })
        .exportAnomaliesPDFBetweenDates({ from, to, errKeys, caisse });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
