<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Export Chèques</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #2F5AEA;
      --brand-dark: #2447bb;
      --brand-soft: #eef3ff;
      --text: #162033;
      --muted: #6b7280;
      --border: #d9e2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: var(--text);
    }
    .page { padding: 18px 22px 18px; }
    .section-title {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
    }
    .field-card,
    .toggle-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      margin-bottom: 14px;
    }
    .toggle-card { background: var(--brand-soft); }
    .form-check-label,
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .form-control {
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
    }
    .submit-btn {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.22);
    }
    .submit-btn:hover { background: var(--brand-dark); }
    .signature {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--brand);
    }
    .signature a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }
    #loaderOverlay {
      display: none; position: fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(255,255,255,0.85);
      z-index:9999; justify-content:center; align-items:center; flex-direction:column;
    }
    #loaderOverlay .spinner-border {
      width: 2.5rem !important;
      height: 2.5rem !important;
      border-width: 0.22rem;
      color: var(--brand) !important;
    }
    #loaderMessage {
      color: var(--brand) !important;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <span class="section-title">Période</span>
    <div class="toggle-card">
      <div class="form-check mb-0">
        <input class="form-check-input" type="checkbox" id="rangeToggle"
               onchange="toggleRange(this)">
        <label class="form-check-label" for="rangeToggle">
          Extraire sur intervalle
        </label>
      </div>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-12 col-md-6">
        <div class="field-card">
        <label for="dateFrom" class="form-label">Date</label>
        <input type="date" id="dateFrom" class="form-control">
        </div>
      </div>
      <div class="col-12 col-md-6 d-none" id="colTo">
        <div class="field-card">
        <label for="dateTo" class="form-label">à</label>
        <input type="date" id="dateTo" class="form-control">
        </div>
      </div>
    </div>
    <button class="submit-btn" onclick="exportChq()">Extraire les Chèques</button>
    <div class="signature">
      <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank" rel="noopener noreferrer">Utema</a>. 2026</span>
    </div>
  </div>

  <div id="loaderOverlay">
    <div class="spinner-border" role="status"></div>
    <div id="loaderMessage" class="mt-3">Création du PDF…</div>
  </div>

  <script>
    function toggleRange(cb) {
      document.getElementById('colTo')
        .classList.toggle('d-none', !cb.checked);
    }
    function exportChq() {
      const from = document.getElementById('dateFrom').value;
      if (!from) return alert("Choisissez au moins la date de début.");
      const to = document.getElementById('rangeToggle').checked
        ? document.getElementById('dateTo').value
        : '';
      if (document.getElementById('rangeToggle').checked && !to)
        return alert("Choisissez également la date de fin.");
      document.getElementById('loaderOverlay').style.display = 'flex';
      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler(err => {
          document.getElementById('loaderOverlay').style.display = 'none';
          alert("Erreur export : " + err.message);
        })
        .exportChqPDFBetweenDates(from, to);
    }
  </script>
</body>
</html>
