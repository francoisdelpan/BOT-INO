<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fin de poste - Contrôle caisse centrale</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    :root {
      --brand: #2F5AEA;
      --brand-dark: #2447bb;
      --brand-soft: #eef3ff;
      --text: #162033;
      --muted: #6b7280;
      --border: #d9e2ff;
      --danger: #c62828;
      --surface: #f8faff;
      --success-soft: #e8f7e4;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: var(--text);
    }
    .page {
      padding: 18px 22px 18px;
    }
    .section {
      margin-bottom: 18px;
    }
    .section-title {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
    }
    .input-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }
    .field-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .field-card label,
    .modal-body label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .form-control,
    .form-select {
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 90, 234, 0.12);
    }
    .steps-wrap {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
    }
    .step-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(47, 90, 234, 0.06);
    }
    .step-card:last-child { margin-bottom: 0; }
    .step-title {
      margin-bottom: 12px;
      font-weight: 700;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--text);
    }
    .skip-btn {
      width: auto;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
    }
    .skip-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-soft);
    }
    .checkpoint-line {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .checkpoint-line + .checkpoint-line {
      margin-top: 10px;
    }
    .checkpoint-line .small {
      font-size: 13px !important;
      line-height: 1.45;
      color: var(--text);
    }
    .checkpoint-line .amount-input,
    .checkpoint-line .quantity-input {
      width: 92px;
      margin-left: 0;
    }
    .btn-outline-success,
    .btn-outline-secondary,
    .btn-info {
      border-radius: 12px;
      font-weight: 700;
    }
    .btn-outline-success {
      border-color: #a9d4b1;
      color: #2e7d32;
      background: #fff;
    }
    .btn-success,
    .btn-outline-success:hover {
      background: #2e7d32;
      border-color: #2e7d32;
      color: #fff;
    }
    .btn-outline-secondary {
      border-color: var(--border);
      color: var(--muted);
      background: #fff;
    }
    .btn-danger,
    .btn-outline-secondary:hover {
      background: #fff5f5;
      border-color: #f4c7c7;
      color: var(--danger);
    }
    .btn-info {
      border: 0;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.18);
    }
    .btn-info:hover {
      background: var(--brand-dark);
      color: #fff;
    }
    .submit-wrap {
      margin-top: 18px;
    }
    .submit-btn {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.22);
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }
    .submit-btn:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }
    .signature {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--brand);
    }
    .signature a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }
    .signature a:hover {
      text-decoration: none;
    }
    #loaderOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255,255,255,0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #loaderOverlay .spinner-border {
      width: 2.5rem !important;
      height: 2.5rem !important;
      border-width: 0.22rem;
      color: var(--brand) !important;
    }
    #loaderMessage {
      color: var(--brand) !important;
      font-size: 13px;
      font-weight: 700;
    }
    .skipped-step {
      opacity: 0.42;
      filter: grayscale(0.22);
      pointer-events: none;
    }
    .skipped-step .checkpoint-line {
      background: #f3f6fb;
      border-color: #d8dfef;
    }
    .btn-disabled-fake { opacity: 0.5; cursor: not-allowed; border: none !important; background: transparent !important; }
    .checkpoint-line.br-saved,
    .checkpoint-line.chq-saved { background-color: var(--success-soft) !important; }
    .modal-content {
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .modal-header,
    .modal-footer {
      border-color: var(--border);
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-footer .btn-primary {
      border: 0;
      border-radius: 12px;
      background: var(--brand);
      box-shadow: 0 10px 24px rgba(47, 90, 234, 0.18);
    }
    .modal-footer .btn-primary:hover {
      background: var(--brand-dark);
    }
    @media (max-width: 768px) {
      .page { padding: 16px; }
      .input-row { grid-template-columns: 1fr; }
      .step-title { align-items: flex-start; flex-direction: column; }
      .checkpoint-line {
        flex-wrap: wrap;
        align-items: flex-start !important;
      }
      .checkpoint-line .amount-input,
      .checkpoint-line .quantity-input {
        width: 100%;
      }
    }
  </style>
</head>
<body onload="loadAddEndShiftForm()">
  <div class="page">
    <div class="section">
      <span class="section-title">Contexte</span>
      <div class="input-row">
        <div class="field-card">
          <label class="form-label">Date</label>
          <input type="date" id="incidentDate" class="form-control">
        </div>
        <div class="field-card">
          <label class="form-label">N° de caisse</label>
          <select id="caisseInput" class="form-select">
            <option value="">Sélectionnez une caisse…</option>
            <!-- on injecte ici les options via JS -->
          </select>
        </div>
        <div class="field-card">
          <label class="form-label">Superviseur</label>
          <input type="text" id="supervisorInput" class="form-control" list="supervisorList" placeholder="Prénom NOM">
          <datalist id="supervisorList"></datalist>
        </div>
      </div>
    </div>

    <div class="section">
      <span class="section-title">Contrôles</span>
      <div class="steps-wrap">
        <div id="stepContainer"></div>
      </div>
    </div>

    <div class="submit-wrap">
      <button id="submitBtn" class="submit-btn" onclick="submitEndShift()" disabled>
        ✅ Valider la fin de poste
      </button>
    </div>

    <div class="signature">
      <span>Made with &lt;3 by <a href="https://utema.fr" target="_blank" rel="noopener noreferrer">Utema</a>. 2026</span>
    </div>
  </div>

  <!-- Modal BR retirée du flux actif. La logique dépréciée est conservée côté JS pour référence. -->

  <!-- Modal CHQ -->
  <div class="modal fade" id="chqModal" tabindex="-1" aria-labelledby="chqModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="chqModalLabel">Détails Chèques</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
        </div>
        <div class="modal-body">
          <form id="chqForm">
            <div class="mb-3">
              <label for="chqTicket" class="form-label">Nombre sur le ticket</label>
              <input type="number" step="0.01" class="form-control" id="chqTicket">
            </div>
            <div class="mb-3">
              <label for="chqCounted" class="form-label">Nombre compté</label>
              <input type="number" step="0.01" class="form-control" id="chqCounted">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          <button type="button" class="btn btn-primary" onclick="saveChqDetails()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loaderOverlay">
    <div class="spinner-border text-primary" role="status" style="width:3rem; height:3rem;"></div>
    <div id="loaderMessage" class="mt-3 text-primary fw-bold">Chargement...</div>
  </div>

  <script>
    let stepData = [];
    let isChqSubmitted = false;
    let isChqChecked = false;
    let currentChqLine = null;

    function loadAddEndShiftForm() {
      showLoader("Chargement…");
      google.script.run
        .withSuccessHandler(data => {
          stepData = data.steps;
          populateCaisseList(data.operators);
          populateSupervisorList(data.supervisors);
          renderSteps(stepData);
          hideLoader();
          initInputs();
          updateSubmitButtonState();
        })
        .withFailureHandler(error => {
          hideLoader();
          alert("Erreur chargement fin de poste : " + error.message);
        })
        .loadAddEndShiftData();
    }

    function populateCaisseList(ops) {
      const sel = document.getElementById("caisseInput");
      sel.innerHTML = '<option value="">Sélectionnez une caisse…</option>';
      ops.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.label;
        opt.text = o.label;
        sel.appendChild(opt);
      });
    }

    function populateSupervisorList(sups) {
      const dl = document.getElementById("supervisorList");
      dl.innerHTML = "";
      sups.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.label;
        dl.appendChild(opt);
      });
    }

    function renderSteps(steps) {
      const container = document.getElementById("stepContainer");
      container.innerHTML = "";
      steps.forEach((step, i) => {
        const card = document.createElement("div");
        card.className = "step-card";
        card.style.borderColor = getPastelColor(i);
        card.innerHTML = `
          <div class="step-title">
            ${step.label}
            <button class="btn btn-outline-secondary btn-sm skip-btn"
                    onclick="toggleStepSkip('${step.num}', this)">
              Ignorer cette étape
            </button>
          </div>
          <div id="cp-container-${step.num}">
            ${renderCheckpoints(step)}
          </div>`;
        container.appendChild(card);
      });

      syncSpecialCheckpointState();
    }

    function hasSpecialCheckpoint(type) {
      return !!document.querySelector(`.checkpoint-line[data-type="${type}"]`);
    }

    function syncSpecialCheckpointState() {
      if (!hasSpecialCheckpoint("SPECHQ")) {
        isChqSubmitted = true;
        isChqChecked = true;
        currentChqLine = null;
      }
    }

    function renderCheckpoints(step) {
      return step.checkpoints.map(cp => {
        const uiType = cp.type === "SPEBR" ? "TEX" : cp.type;
        const isTEX = uiType === "TEX";
        const hasAMO = uiType.includes("AMO");
        const hasNUM = uiType.includes("NUM");

        /*
        Version dépréciée :
        if (cp.type === "SPEBR") {
          return `
            <div class="d-flex align-items-center gap-2 mb-2 checkpoint-line" data-type="SPEBR">
              <span class="flex-grow-1 small">${cp.instruction}</span>
              <button class="btn btn-info btn-sm" onclick="openBrModal(this)">Gérer BR</button>
            </div>`;
        }
        */

        if (cp.type === "SPECHQ") {
          return `
            <div class="d-flex align-items-center gap-2 mb-2 checkpoint-line" data-type="SPECHQ">
              <span class="flex-grow-1 small">${cp.instruction}</span>
              <button class="btn btn-info btn-sm" onclick="openChqModal(this)">Gérer Chèque</button>
            </div>`;
        }
        return `
          <div class="d-flex align-items-center gap-2 mb-2 checkpoint-line"
              data-type="${uiType}"
              data-original-type="${cp.type}"
              data-pay-key="${cp.payKey}"
              data-error-key="${cp.errorKey}"
              data-cp-key="${cp.cpKey}">
            <span class="flex-grow-1 small">${cp.instruction}</span>
            <button class="btn btn-outline-success btn-sm check-btn"
                    onclick="toggleCheck(this)">
              ✓
            </button>
            <button class="btn btn-outline-secondary btn-sm toggle-error-btn ${isTEX ? 'btn-disabled-fake" disabled' : ''}"
                    onclick="${isTEX ? '' : 'toggleError(this)'}">
              ✖️
            </button>
            <input type="number"
                  class="form-control form-control-sm amount-input"
                  ${hasAMO ? 'placeholder="€"' : ''}
                  disabled>
            <input type="number"
                  class="form-control form-control-sm quantity-input"
                  ${hasNUM ? 'placeholder="Qté"' : ''}
                  disabled>
          </div>`;
      }).join("");
    }

    function toggleCheck(btn) {
      const line = btn.closest('.checkpoint-line');
      const err = line.querySelector('.toggle-error-btn');
      const on = !btn.classList.contains('btn-success');
      btn.classList.toggle('btn-success', on);
      btn.classList.toggle('btn-outline-success', !on);
      if (on) {
        err.classList.replace('btn-danger', 'btn-outline-secondary');
        line.querySelectorAll('input[type=number]').forEach(input => input.disabled = true);
      }
      updateSubmitButtonState();
    }

    function toggleError(btn) {
      const line = btn.closest('.checkpoint-line');
      const chk = line.querySelector('.check-btn');
      const on = !btn.classList.contains('btn-danger');
      btn.classList.toggle('btn-danger', on);
      btn.classList.toggle('btn-outline-secondary', !on);
      if (on) {
        chk.classList.replace('btn-success', 'btn-outline-success');
        const type = line.dataset.type;
        line.querySelector('.amount-input').disabled = !type.includes('AMO');
        line.querySelector('.quantity-input').disabled = !type.includes('NUM');
      } else {
        line.querySelectorAll('input[type=number]').forEach(input => input.disabled = true);
      }
      updateSubmitButtonState();
    }

    function toggleStepSkip(stepNum, btn) {
      const cont = document.getElementById(`cp-container-${stepNum}`);
      const skip = cont.classList.toggle('skipped-step');

      btn.textContent = skip ? "Reprendre l'étape" : "Ignorer cette étape";

      const chqLine = cont.querySelector('[data-type="SPECHQ"]');
      if (chqLine) {
        isChqChecked = skip;
        isChqSubmitted = skip;
        const chqBtn = chqLine.querySelector('button.btn-info');
        if (chqBtn) chqBtn.disabled = skip;
        currentChqLine = skip ? chqLine : null;
        chqLine.classList.toggle('chq-saved', skip);
      }

      cont.querySelectorAll('button').forEach(button => button.disabled = skip);
      updateSubmitButtonState();
    }

    function initInputs() {
      ['incidentDate', 'caisseInput', 'supervisorInput'].forEach(id =>
        document.getElementById(id).addEventListener('input', updateSubmitButtonState)
      );
    }

    function isCheckpointResolved(line) {
      if (line.dataset.type === 'SPECHQ') return isChqChecked;
      if (line.closest('.skipped-step')) return true;
      const checked = line.querySelector('.check-btn').classList.contains('btn-success');
      const errored = line.querySelector('.toggle-error-btn').classList.contains('btn-danger');
      return checked || errored;
    }

    function collectIncidentRows() {
      const date = document.getElementById('incidentDate').value;
      const caisse = document.getElementById('caisseInput').value;
      const rows = [];

      document.querySelectorAll('.checkpoint-line').forEach(line => {
        if (line.dataset.type === 'SPECHQ' || line.closest('.skipped-step')) return;

        const toggleErrBtn = line.querySelector('.toggle-error-btn');
        if (toggleErrBtn && toggleErrBtn.classList.contains('btn-danger')) {
          rows.push({
            date,
            payKey: line.dataset.payKey || "",
            caisse,
            error: line.dataset.errorKey || "",
            state: "",
            amount: parseFloat(line.querySelector('.amount-input').value) || 0,
            quantity: parseInt(line.querySelector('.quantity-input').value, 10) || 0,
            note: ""
          });
        }
      });

      return rows;
    }

    function updateSubmitButtonState() {
      syncSpecialCheckpointState();

      const okDate = !!document.getElementById('incidentDate').value;
      const okCais = !!document.getElementById('caisseInput').value;
      const okSup = !!document.getElementById('supervisorInput').value;
      const allCP = Array.from(document.querySelectorAll('.checkpoint-line')).every(isCheckpointResolved);
      const chqOK = isChqSubmitted || isChqChecked;

      document.getElementById('submitBtn').disabled = !(okDate && okCais && okSup && allCP && chqOK);
    }

    function submitEndShift() {
      if (hasSpecialCheckpoint("SPECHQ") && (!isChqChecked || !isChqSubmitted)) {
        return alert("🚨 Veuillez d'abord gérer les chèques avant de valider la fin de poste.");
      }

      showLoader("Enregistrement…");
      const date = document.getElementById('incidentDate').value;
      const caisse = document.getElementById('caisseInput').value;
      const supervisor = document.getElementById('supervisorInput').value;
      const rows = collectIncidentRows();

      google.script.run
        .withFailureHandler(error => {
          hideLoader();
          alert("Erreur enregistrement : " + error.message);
        })
        .withSuccessHandler(() => {
          hideLoader();
          alert("✅ Fin de poste enregistrée !");
          google.script.host.close();
        })
        .submitEndShiftData({
          date,
          supervisor,
          caisse,
          incidents: rows
        });
    }

    function openChqModal(btn) {
      if (isChqSubmitted) return alert("🚫 Chèque déjà soumis.");
      const date = document.getElementById('incidentDate').value;
      const caisse = document.getElementById('caisseInput').value;
      if (!date || !caisse) return alert("📅 Sélectionnez date et caisse d'abord.");
      currentChqLine = btn.closest('.checkpoint-line');
      new bootstrap.Modal(document.getElementById('chqModal')).show();
    }

    /*
    Version dépréciée :
    function openBrModal(btn) {
      if (isBrSubmitted) return alert("🚫 BR déjà soumis.");
      const date = document.getElementById('incidentDate').value;
      const caisse = document.getElementById('caisseInput').value;
      if (!date || !caisse) return alert("📅 Sélectionnez date et caisse d'abord.");
      currentBrLine = btn.closest('.checkpoint-line');
      new bootstrap.Modal(document.getElementById('brModal')).show();
    }

    function saveBrDetails() {
      showLoader("Enregistrement BR…");
      const dateCode = document.getElementById('incidentDate').value.replace(/-/g,'');
      const caisse = document.getElementById('caisseInput').value;
      const count = parseInt(document.getElementById('brCount').value, 10) || 0;
      const ticketBR = parseFloat(document.getElementById('brTicketAmount').value) || 0;
      const countedTotal = parseFloat(document.getElementById('brCountedAmount').value) || 0;

      google.script.run
        .withSuccessHandler(() => {
          hideLoader();
          isBrSubmitted = true;
          isBrChecked = true;
          currentBrLine.classList.add('br-saved');
          currentBrLine.querySelector('button.btn-info').disabled = true;
          bootstrap.Modal.getInstance(document.getElementById('brModal')).hide();
          updateSubmitButtonState();
        })
        .withFailureHandler(err => {
          hideLoader();
          alert("Erreur BR : " + err.message);
        })
        .submitBRData([{
          dateCode,
          caisse,
          ticketBR,
          sogec: countedTotal,
          scan: 0,
          numeric: (ticketBR - countedTotal).toFixed(2),
          count
        }]);
    }
    */

    function saveChqDetails() {
      showLoader("Enregistrement Chèque…");
      const dateCode = document.getElementById('incidentDate').value.replace(/-/g, '');
      const caisse = document.getElementById('caisseInput').value;
      const ticketChq = parseFloat(document.getElementById('chqTicket').value) || 0;
      const countedChq = parseFloat(document.getElementById('chqCounted').value) || 0;

      google.script.run
        .withSuccessHandler(() => {
          hideLoader();
          isChqSubmitted = true;
          isChqChecked = true;
          currentChqLine.classList.add('chq-saved');
          currentChqLine.querySelector('button.btn-info').disabled = true;
          bootstrap.Modal.getInstance(document.getElementById('chqModal')).hide();
          updateSubmitButtonState();
        })
        .withFailureHandler(err => {
          hideLoader();
          alert("Erreur Chèque : " + err.message);
        })
        .submitChqData([{ dateCode, caisse, ticketChq, countedChq, missing: (ticketChq - countedChq) }]);
    }

    function showLoader(msg = '') {
      document.getElementById('loaderMessage').textContent = msg;
      document.getElementById('loaderOverlay').style.display = 'flex';
    }

    function hideLoader() {
      document.getElementById('loaderOverlay').style.display = 'none';
    }

    function getPastelColor(i) {
      const cols = ["#D2E3FC", "#E6F4EA", "#FCE8E6", "#FFF4DE", "#ECE2F0"];
      return cols[i % cols.length];
    }
  </script>
</body>
</html>
