<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etat du jour</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #loaderOverlay {
      display: none; position: fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(255,255,255,0.85);
      z-index:9999; justify-content:center; align-items:center; flex-direction:column;
    }
  </style>
</head>
<body>
  <div class="p-3">
    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" id="rangeToggle"
             onchange="toggleRange(this)">
      <label class="form-check-label" for="rangeToggle">
        Extraire sur intervalle
      </label>
    </div>
    <div class="row g-2 mb-3">
      <div class="col">
        <label for="dateFrom" class="form-label">Date</label>
        <input type="date" id="dateFrom" class="form-control">
      </div>
      <div class="col d-none" id="colTo">
        <label for="dateTo" class="form-label">à</label>
        <input type="date" id="dateTo" class="form-control">
      </div>
    </div>
    <button class="btn btn-primary" onclick="exportDays()">Extraire l'état du jour</button>
  </div>

  <div id="loaderOverlay">
    <div class="spinner-border text-primary" style="width:3rem; height:3rem;"></div>
    <div id="loaderMessage" class="mt-3 text-primary fw-bold">Création du PDF…</div>
  </div>

  <script>
    function toggleRange(cb) {
      document.getElementById('colTo')
        .classList.toggle('d-none', !cb.checked);
    }
    function exportDays() {
      const from = document.getElementById('dateFrom').value;
      if (!from) return alert("Choisissez au moins la date de début.");
      const to = document.getElementById('rangeToggle').checked
        ? document.getElementById('dateTo').value
        : '';
      if (document.getElementById('rangeToggle').checked && !to)
        return alert("Choisissez également la date de fin.");
      document.getElementById('loaderOverlay').style.display = 'flex';
      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler(err => {
          document.getElementById('loaderOverlay').style.display = 'none';
          alert("Erreur export : " + err.message);
        })
        .exportDaysPDFBetweenDates(from, to);
    }
  </script>
</body>
</html>
